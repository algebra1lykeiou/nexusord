<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexusord</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0b0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 5rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -2px;
    }

    p {
      color: #666;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    a {
      display: inline-block;
      background: #5865f2;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.9rem 2.5rem;
      border-radius: 100px;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }

    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nexusord</h1>
    <p>Voice &amp; Chat</p>
    <a href="https://mega.nz/file/APJXlL7T#xnWcK2mwzpZufAwmNWwNUloK2QDrUNQn42R2tnyt2kM">
      Download
    </a>
  </div>
</body>
</html>
